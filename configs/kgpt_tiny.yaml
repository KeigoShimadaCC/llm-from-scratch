schema_version: 1
run_name: phase04a_tiny
seed: 20260601
device: cpu
dtype: float32
model_name: kgpt-tiny-5m
tokenizer:
  model_path: data/tokenized/tokenizers/phase02a-byte-bpe-bilingual.json
  fallback_training_config: configs/tokenizer_bilingual.yaml
data:
  tokenized_config: configs/kgpt_tiny_tokenized.yaml
  metadata_path: data/tokenized/phase04a_tiny/metadata.json
  split: train
  validation_split: validation
model:
  vocab_size: 377
  context_length: 32
  embedding_dim: 256
  num_layers: 7
  num_heads: 8
  mlp_hidden_dim: 1024
  dropout: 0.0
  tie_embeddings: true
optimizer:
  name: adamw
  learning_rate: 0.001
scheduler:
  warmup_steps: 10
  min_lr_factor: 0.10
training:
  batch_size: 2
  train_steps: 200
  output_dir: experiments/runs
  checkpoint_every: 50
  eval_every: 20
  sample_every: 50
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  validation_batches: 4
  loss_improvement_threshold: 0.10
run_budget:
  target_steps: 200
  target_tokens: 12800
  target_wall_clock_minutes: 30
  hardware: Mac local CPU/MPS, default validation uses CPU for reproducibility.
generation:
  max_new_tokens: 32
  temperature: 0.0
  top_k: 0
sample_prompts:
  - hello
  - The model learns
  - training loop
  - 小さなモデル
  - 検証データ
