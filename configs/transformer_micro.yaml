schema_version: 1
run_name: phase03a_transformer_micro
seed: 20260601
device: cpu
dtype: float32
model_name: kgpt-decoder-transformer-micro
tokenizer:
  model_path: data/tokenized/tokenizers/phase02a-byte-bpe-bilingual.json
  fallback_training_config: configs/tokenizer_bilingual.yaml
data:
  tokenized_config: configs/tokenized_smoke.yaml
