schema_version: 1
run_name: phase05a_kgpt30m
seed: 20260601
device: cpu
dtype: float32
model_name: kgpt-30m
tokenizer:
  model_path: data/tokenized/tokenizers/phase02a-byte-bpe-bilingual.json
  fallback_training_config: configs/tokenizer_bilingual.yaml
data:
  tokenized_config: configs/kgpt_tiny_tokenized.yaml
  metadata_path: data/tokenized/phase04a_tiny/metadata.json
  split: train
  validation_split: validation
model:
  vocab_size: 377
  context_length: 32
  embedding_dim: 512
  num_layers: 10
  num_heads: 8
  mlp_hidden_dim: 2048
  dropout: 0.0
  tie_embeddings: true
optimizer:
  name: adamw
  learning_rate: 0.0005
scheduler:
  warmup_steps: 5
  min_lr_factor: 0.10
training:
  batch_size: 1
  train_steps: 40
  output_dir: experiments/runs
  checkpoint_every: 20
  eval_every: 10
  sample_every: 20
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  validation_batches: 4
  loss_improvement_threshold: 0.02
scale:
  min_parameters: 30000000
  max_parameters: 70000000
  label: kgpt-30m
run_budget:
  target_steps: 40
  target_tokens: 1280
  target_wall_clock_minutes: 45
  hardware: Mac local CPU/MPS, PHASE-05A validation uses CPU dry-run plus local smoke evidence.
generation:
  max_new_tokens: 32
  temperature: 0.0
  top_k: 0
sample_prompts:
  - hello
  - The model learns
  - training loop
  - 小さなモデル
  - 検証データ
