  name: adamw
  learning_rate: 0.005
training:
  batch_size: 4
  train_steps: 20
  output_dir: experiments/runs
  checkpoint_every: 20
  eval_every: 10
generation:
  max_new_tokens: 16
  temperature: 0.0
  top_k: 0
